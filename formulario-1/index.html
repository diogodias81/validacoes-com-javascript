
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Identidade</title>
   
</head>
<body>
    <h1>Bem vindo ao Formulario de Emissão de RG</h1>

    <div id="mensagem-Erro"></div>
    <div id="mensagem-Sucesso"></div>
    <form action="">
    <div>
        <label for="nome">Nome*: </label>
        <input type="text" id="nome" class="campo-input">
    </div>
    <br>
    <div>
        <label for="idade">Idade*:</label>
        <input type="number" class="campo-input" id="idade" min="0" max="10">
    </div>
    <br>
    <div>
        <label for="cpf">Cpf*:</label>
        <input type="text" class="campo-input" id="cpf" maxlength="11">
    </div>
    <br>
    <div>
        <label for="telefone">Numero contato</label>
        <input type="text" class="campo-input" id="telefone" maxlength="8">
    </div>    
    <br>
    <div>
        <label for="dataNascimento">Data Nascimento*:</label>
        <input type="date" class="campo-input" id="dataNascimento">
    </div>
    <div>
    <br>
    <label for="email">E-mail*:</label>
        <input type="email" class="campo-input" id="email" placeholder="email.teste@gmail.com">
    </div>
    <br>
    <div>
        <label for="nomeMae">Nome Da Mãe*:</label>
        <input type="text" class="campo-input" id="nomeMae">
    </div>
    <br>
    <div>
        <label for="nomePai">Nome Do Pai*:</label>
        <input type="text" class="campo-input" id="nomePai">
    </div>
    <br>
    <div class="radio-group">
        <label for=""><strong>Insira o Setor:</strong> </label>
        <br>
        <input type="radio" name="setor" id="Setor1" class="campoSetor">
        <label for="">Policia Civil</label>
        <br>
        <input type="radio" name="setor" id="Setor2" class="campoSetor">
        <label for="">Estatistica</label>
        <br>
        <input type="radio" name="setor" id="Setor3" class="campoSetor">
        <label for="">Sistemas Corporativos</label>
        
    </div>
    <br>
   <button type="button" onclick="enviarDados()">Enviar Cadastro</button>
</form>
    <script src="script.js"></script>
</body>
</html>
