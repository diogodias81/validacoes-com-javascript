
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Identidade</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
        }
        form{
            border-radius: 5px;
            background-color: #f2f2f2;
            padding: 20px;
            width: 60%;
            max-width: 800px;
        }
        label{
            display: block;
            margin-top:10px;
            font-weight: bold;
        }
        input[type="text"],input[type="number"],input[type="email"],input[type="date"],select{
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            display: inline-block;
            border: 1px solid #000000;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .radio-group label{
            display:inline-block ;
            margin-right: 15px;
            font-weight: normal;
        }
        
        .radio-group input[type="radio"]{
            margin-right: 5px;
            
        }
      
        input[type="button"]{
            width: 100%;
            background-color: rgba(255, 255, 255, 0.667);
            color: white;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
          button[type="button"]:hover{
            background-color: rgb(255, 0, 0);
        }
       
        #mensagem-Erro{
            color: red;
            font-weight:bold ;
            margin-bottom: 10px;
        }
        
        #mensagem-Sucesso{
            color:green;
            font-weight:bold ;
            margin-bottom: 10px;
        }
         
    </style>
</head>
<body>
    <h1>Bem vindo ao Formulario de Emissão de RG</h1>

    <div id="mensagem-Erro"></div>
    <div id="mensagem-Sucesso"></div>
    <form action="">
    <div>
        <label for="nome">Nome*: </label>
        <input type="text" id="nome" class="campo-input">
    </div>
    <br>
    <div>
        <label for="idade">Idade*:</label>
        <input type="number" class="campo-input" id="idade" min="0" max="10">
    </div>
    <br>
    <div>
        <label for="cpf">Cpf*:</label>
        <input type="text" class="campo-input" id="cpf" maxlength="11">
    </div>
    <br>
    <div>
        <label for="telefone">Numero contato</label>
        <input type="text" class="campo-input" id="telefone" maxlength="8">
    </div>    
    <br>
    <div>
        <label for="dataNascimento">Data Nascimento*:</label>
        <input type="date" class="campo-input" id="dataNascimento">
    </div>
    <div>
    <br>
    <label for="email">E-mail*:</label>
        <input type="email" class="campo-input" id="email" placeholder="email.teste@gmail.com">
    </div>
    <br>
    <div>
        <label for="nomeMae">Nome Da Mãe*:</label>
        <input type="text" class="campo-input" id="nomeMae">
    </div>
    <br>
    <div>
        <label for="nomePai">Nome Do Pai*:</label>
        <input type="text" class="campo-input" id="nomePai">
    </div>
    <br>
    <div class="radio-group">
        <label for=""><strong>Insira o Setor:</strong> </label>
        <br>
        <input type="radio" name="setor" id="Setor1" class="campoSetor">
        <label for="">Policia Civil</label>
        <br>
        <input type="radio" name="setor" id="Setor2" class="campoSetor">
        <label for="">Estatistica</label>
        <br>
        <input type="radio" name="setor" id="Setor3" class="campoSetor">
        <label for="">Sistemas Corporativos</label>
        
    </div>
    <br>
   <button type="button" onclick="enviarDados()">Enviar Cadastro</button>
</form>
    <script src="script.js"></script>
</body>
</html>
