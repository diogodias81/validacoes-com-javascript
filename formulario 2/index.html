<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Formulario de CNH</h1>
    <div id="mensagemErro"></div>
    <div id="mensagemSucesso"></div>
    <div id="concluido"></div>
    <form action="">
        <div>
            <label for="">Nome Candidato:</label>
            <input type="text" id="nome">
        </div>
        <br>
        <div>
            <label for="">idade:</label>
            <input type="number" id="idade" min="0">
        </div>
        <br>
        <div>
            <label for="">Localidade*:</label>
            <input type="text" id="localidade">
        </div>
        <br>
        <div>
            <label for="">Nome pai*:</label>
            <input type="text" id="nomePai">
        </div>
        <br>
        <div>
            <label for="">Nome Mãe*:</label>
            <input type="text" id="nomeMae">
        </div>
        <br>
        <div>
            <label for="">Telefone:</label>
            <input type="text" id="telefone" maxlength="11">
        </div>
        <br>
        <div>
            <label for="">E-mail:</label>
            <input type="email" id="email">
        </div>
        <br>
        <button type="button" onclick="enviarCampo()">ENVIAR</button>
    </form>

    <script src="script.js"></script>

</body>
</html>
